# Custom values for aiproxy web helm chart.
# This file contains user-customizable configurations.

replicas: 2

cloudPort: ""
httpPort: ""
disableHttps: false

resources:
  requests:
    cpu: 50m
    memory: 50Mi
  limits:
    cpu: 500m
    memory: 512Mi

aiproxy:
  NODE_TLS_REJECT_UNAUTHORIZED: "1"
  IS_INVITATION_ACTIVE: "false"
  DOC_URL: "https://sealos.run/docs/guides/ai-proxy"
